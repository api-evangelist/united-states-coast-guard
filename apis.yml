    description: >-
      The Coast Guard Maritime Information Exchange (CGMIX) provides XML web
      services for accessing Coast Guard maritime information including vessel
      documentation, Port State Information Exchange (PSIX) data, equipment
      certifications, and Incident Investigation Reports (IIR). Data originates
      from the Marine Information for Safety and Law Enforcement (MISLE) system
      and is updated weekly.
    contact:
      FN: U.S. Coast Guard
      url: https://cgmix.uscg.mil/

  - aid: united-states-coast-guard:navcen-ais-vessel-information
    name: NAVCEN AIS Vessel Information Verification Service
    tags:
      - Maritime
      - AIS
      - Vessel Tracking
      - Federal Government
    humanURL: https://www.navcen.uscg.gov/ais-vivs-home
    baseURL: https://www.navcen.uscg.gov
    properties:
      - url: https://www.navcen.uscg.gov/ais-vivs-home
        type: Documentation
      - url: https://www.navcen.uscg.gov/ais-vessel-information-verification-service
        type: Documentation
    description: >-
      The Vessel Information Verification Service (VIVS) is a NAVCEN web
      service that allows retrieval of a vessel's broadcasted AIS static data,
      including Maritime Mobile Service Identity (MMSI), call sign, vessel name,
      official number, dimensions, draft, vessel type, and positioning source.
      Provided by the U.S. Coast Guard Navigation Center.

