description: >-
  The United States Coast Guard is a branch of the military responsible for
  enforcing maritime laws, protecting the nation's waterways and coastlines,
  and ensuring the safety and security of seafarers. They conduct search and
  rescue operations, respond to environmental disasters, combat illegal drug
  trafficking and immigration, and conduct security patrols to thwart
  terrorism threats. The USCG provides public APIs and data services through
  the CGMIX Maritime Information Exchange, the Navigation Center (NAVCEN),
  and the National Vessel Documentation Center (NVDC).
