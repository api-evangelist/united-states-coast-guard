naftiko: "1.0.0-alpha1"

info:
  label: "CGMIX Maritime Information Exchange"
  description: >-
    The Coast Guard Maritime Information Exchange (CGMIX) provides access to
    U.S. Coast Guard maritime data including vessel documentation, Port State
    Control inspection records, equipment certifications, and incident
    investigation reports.
  tags:
    - Maritime Safety
    - Vessel Documentation
    - Coast Guard
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys: {}

capability:
  consumes:
    - type: http
      namespace: cgmix
      baseUri: https://cgmix.uscg.mil
      description: "CGMIX Maritime Information Exchange XML and web services"
      resources:
        - name: vessel-summary
          path: /xml/PSIXData.asmx/getVesselSummaryXMLString
          description: "Port State Information Exchange vessel summary records"
          operations:
            - name: get-vessel-summary
              method: GET
              description: "Get Vessel Summary"
              inputParameters:
                - name: VesselID
                  in: query
                  type: string
                  required: true
                  description: "Official vessel number"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vessel-particulars
          path: /xml/PSIXData.asmx/getVesselParticularsXMLString
          description: "Vessel dimensions, tonnage, and technical specifications"
          operations:
            - name: get-vessel-particulars
              method: GET
              description: "Get Vessel Particulars"
              inputParameters:
                - name: VesselID
                  in: query
                  type: string
                  required: true
                  description: "Official vessel number"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vessel-cases
          path: /xml/PSIXData.asmx/getVesselCasesXMLString
          description: "Port State Control inspection cases"
          operations:
            - name: get-vessel-cases
              method: GET
              description: "Get Vessel Inspection Cases"
              inputParameters:
                - name: VesselID
                  in: query
                  type: string
                  required: true
                  description: "Official vessel number"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vessel-deficiencies
          path: /xml/PSIXData.asmx/getVesselDeficienciesXMLString
          description: "Vessel inspection deficiency records"
          operations:
            - name: get-vessel-deficiencies
              method: GET
              description: "Get Vessel Deficiencies"
              inputParameters:
                - name: VesselID
                  in: query
                  type: string
                  required: true
                  description: "Official vessel number"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vessel-documents
          path: /xml/PSIXData.asmx/getVesselDocumentsXMLString
          description: "Vessel certificates and statutory documents"
          operations:
            - name: get-vessel-documents
              method: GET
              description: "Get Vessel Certificates and Documents"
              inputParameters:
                - name: VesselID
                  in: query
                  type: string
                  required: true
                  description: "Official vessel number"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: equipment
          path: /xml/EquipmentData.asmx/getEquipmentDetails
          description: "USCG approved marine equipment certifications"
          operations:
            - name: get-equipment-details
              method: GET
              description: "Get Equipment Certification Details"
              inputParameters:
                - name: EquipmentId
                  in: query
                  type: string
                  required: true
                  description: "USCG equipment certification ID"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: incident-reports
          path: /xml/IIRData.asmx/getIIRReferralForEnforcementActionXMLString
          description: "Incident Investigation Report enforcement referrals"
          operations:
            - name: get-incident-investigation-referral
              method: GET
              description: "Get Incident Investigation Referral"
              inputParameters:
                - name: ActivityId
                  in: query
                  type: string
                  required: true
                  description: "Marine casualty investigation activity identifier"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: cgmix-rest
      resources:
        - path: /v1/vessels/{vesselId}/summary
          name: vessel-summary
          description: "Retrieve vessel summary data by official number"
          operations:
            - method: GET
              name: get-vessel-summary
              description: "Get vessel summary information"
              call: "cgmix.get-vessel-summary"
              with:
                VesselID: "rest.vesselId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vessels/{vesselId}/cases
          name: vessel-cases
          description: "Retrieve vessel Port State Control inspection cases"
          operations:
            - method: GET
              name: get-vessel-cases
              description: "Get vessel inspection cases"
              call: "cgmix.get-vessel-cases"
              with:
                VesselID: "rest.vesselId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/equipment/{equipmentId}
          name: equipment-details
          description: "Retrieve USCG approved equipment certification"
          operations:
            - method: GET
              name: get-equipment-details
              description: "Get equipment certification details"
              call: "cgmix.get-equipment-details"
              with:
                EquipmentId: "rest.equipmentId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: cgmix-mcp
      transport: http
      tools:
        - name: get-vessel-summary
          description: "Retrieve summary information for a USCG documented vessel"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-vessel-summary"
          with:
            VesselID: "tools.vessel_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vessel-particulars
          description: "Retrieve vessel dimensions, tonnage, and technical specifications"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-vessel-particulars"
          with:
            VesselID: "tools.vessel_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vessel-cases
          description: "Retrieve Port State Control inspection cases for a vessel"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-vessel-cases"
          with:
            VesselID: "tools.vessel_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vessel-deficiencies
          description: "Retrieve deficiencies found during vessel inspections"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-vessel-deficiencies"
          with:
            VesselID: "tools.vessel_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vessel-documents
          description: "Retrieve certificates and statutory documents for a vessel"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-vessel-documents"
          with:
            VesselID: "tools.vessel_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-equipment-details
          description: "Retrieve USCG marine equipment approval certification details"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-equipment-details"
          with:
            EquipmentId: "tools.equipment_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-incident-investigation-referral
          description: "Retrieve incident investigation report referral for enforcement action"
          hints:
            readOnly: true
            idempotent: true
          call: "cgmix.get-incident-investigation-referral"
          with:
            ActivityId: "tools.activity_id"
          outputParameters:
            - type: object
              mapping: "$."
