vocabulary:
  name: United States Coast Guard Vocabulary
  description: >-
    Domain vocabulary for U.S. Coast Guard maritime safety, vessel documentation,
    port state control, and regulatory compliance operations.
  version: 1.0.0
  created: '2026-05-03'
  modified: '2026-05-03'

terms:
  - term: AIS
    label: Automatic Identification System
    definition: >-
      A transponder-based vessel tracking system used for collision avoidance
      and maritime domain awareness. Vessels of certain classes are required to
      carry AIS transponders that broadcast position, identity, and voyage data.
    domain: Maritime Safety

  - term: CGMIX
    label: Coast Guard Maritime Information Exchange
    definition: >-
      A USCG web portal and API platform that provides public access to maritime
      information including vessel documentation, Port State Control records,
      equipment certifications, and incident investigations.
    domain: Data Systems

  - term: HIN
    label: Hull Identification Number
    definition: >-
      A unique 12-character serial number assigned to a hull by the manufacturer,
      used to identify individual vessels for registration, documentation, and
      safety recall purposes.
    domain: Vessel Documentation

  - term: IIR
    label: Incident Investigation Report
    definition: >-
      A formal report generated by the USCG following investigation of a marine
      casualty, including findings of fact, contributing factors, causal factors,
      and recommendations for enforcement action.
    domain: Marine Casualty

  - term: MISLE
    label: Marine Information for Safety and Law Enforcement
    definition: >-
      The USCG's primary enterprise information system for tracking inspections,
      investigations, response cases, and law enforcement activities.
    domain: Data Systems

  - term: MMSI
    label: Maritime Mobile Service Identity
    definition: >-
      A unique nine-digit number assigned to a ship radio station (or similar
      device) for identification in digital communications, including AIS and DSC.
    domain: Communications

  - term: NAVCEN
    label: Navigation Center
    definition: >-
      The USCG Navigation Center provides services to the maritime community
      including NAIS vessel tracking, GPS status, international maritime
      notices, and light lists.
    domain: Navigation

  - term: NFIRS
    label: National Fire Incident Reporting System
    definition: >-
      A voluntary reporting standard managed by the USCG and USFA that captures
      fire department incident data. NFIRS is transitioning to NERIS in 2026.
    domain: Fire Safety

  - term: NVDC
    label: National Vessel Documentation Center
    definition: >-
      The USCG office responsible for issuing documentation (certificates of
      documentation) to eligible vessels, including title recording and
      endorsements for coastwise, fishery, and recreational trade.
    domain: Vessel Documentation

  - term: Port State Control
    label: Port State Control (PSC)
    definition: >-
      The inspection of foreign vessels in national ports to verify the
      condition of the ship and its equipment comply with international
      regulations and that the ship is manned and operated in compliance
      with applicable international rules.
    domain: Maritime Safety

  - term: PSIX
    label: Port State Information Exchange
    definition: >-
      A CGMIX data service providing access to vessel particulars, certificates,
      deficiencies, and Port State Control examination records from the MISLE system.
    domain: Data Systems

  - term: SAR
    label: Search and Rescue
    definition: >-
      USCG-coordinated operations to locate and assist persons or vessels in
      distress at sea or in navigable waters.
    domain: Emergency Response

  - term: SOLAS
    label: Safety of Life at Sea
    definition: >-
      An international maritime safety treaty specifying minimum safety standards
      in construction, equipment, and operation of merchant ships.
    domain: International Regulation

  - term: VIVS
    label: Vessel Information Verification Service
    definition: >-
      A NAVCEN web service that allows users to retrieve a vessel's broadcasted
      AIS static data for the purpose of verifying vessel identity and characteristics.
    domain: Data Systems
